name: MarkdownQuickLook
options:
  minimumXcodeGenVersion: 2.45.3
settings:
  base:
    SWIFT_VERSION: 5.0
    DEVELOPMENT_TEAM: 42QK7B5HYB
targets:
  MarkdownQuickLookApp:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: MarkdownQuickLookApp/App
      - path: MarkdownQuickLookApp/Assets.xcassets
    settings:
      base:
        PRODUCT_NAME: MarkdownQuickLook
        PRODUCT_BUNDLE_IDENTIFIER: com.rzkr.MarkdownQuickLook.app
        INFOPLIST_FILE: MarkdownQuickLookApp/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: MarkdownQuickLookApp/MarkdownQuickLookApp.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_APP_SANDBOX: YES
    dependencies:
      - target: MarkdownQuickLookPreviewExtension
        embed: true
      - target: MarkdownRendering

  MarkdownQuickLookPreviewExtension:
    type: app-extension
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: MarkdownQuickLookPreviewExtension
        excludes:
          - Info.plist
          - Tests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rzkr.MarkdownQuickLook.app.preview
        INFOPLIST_FILE: MarkdownQuickLookPreviewExtension/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_STYLE: Automatic
        ENABLE_APP_SANDBOX: YES
        ENABLE_USER_SELECTED_FILES: readonly
        CODE_SIGN_ENTITLEMENTS: MarkdownQuickLookPreviewExtension/MarkdownQuickLookPreviewExtension.entitlements
    dependencies:
      - target: MarkdownRendering

  MarkdownQuickLookAppTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: MarkdownQuickLookApp/App/InstallExperience.swift
      - path: MarkdownQuickLookApp/Tests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rzkr.MarkdownQuickLook.appTests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: ""
        BUNDLE_LOADER: ""

  MarkdownRendering:
    type: framework.static
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: MarkdownRendering/Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rzkr.MarkdownQuickLook.rendering
        GENERATE_INFOPLIST_FILE: YES

  MarkdownRenderingTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: MarkdownRendering/Tests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rzkr.MarkdownQuickLook.renderingTests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: ""
        BUNDLE_LOADER: ""
    dependencies:
      - target: MarkdownRendering

  MarkdownQuickLookPreviewExtensionTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: MarkdownQuickLookPreviewExtension/PreviewSizing.swift
      - path: MarkdownQuickLookPreviewExtension/MarkdownTextView.swift
      - path: MarkdownQuickLookPreviewExtension/PreviewRootView.swift
      - path: MarkdownQuickLookPreviewExtension/PreviewViewController.swift
      - path: MarkdownQuickLookPreviewExtension/Tests
      - path: MarkdownQuickLookPreviewExtension/PreviewLoadingCoordinator.swift
      - path: MarkdownQuickLookPreviewExtension/PreviewRequestTracker.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rzkr.MarkdownQuickLook.previewExtensionTests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: ""
        BUNDLE_LOADER: ""
    dependencies:
      - target: MarkdownRendering
